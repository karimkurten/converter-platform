name: Generate Weekly Social Media Content

on:
  schedule:
    # Every Sunday at 9:00 AM UTC (4 AM EST / 1 AM PST)
    - cron: '0 9 * * 0'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      premium_mode:
        description: 'Use premium AI for all posts (Sonnet 4.5)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: automation/social-media/scripts
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv google-api-python-client google-auth requests
      
      - name: Set up Google service account
        working-directory: automation/social-media/scripts
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service-account.json
      
      - name: Generate weekly content
        working-directory: automation/social-media/scripts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.premium_mode }}" = "true" ]; then
            python generate_week.py --premium
          else
            python generate_week.py
          fi
      
      - name: Push content to Google Sheets
        working-directory: automation/social-media/scripts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: service-account.json
        run: python push_to_sheets.py

      - name: Email weekly pack
        working-directory: automation/social-media/scripts
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python send_email.py
      
      - name: Upload generated content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-content-${{ github.run_id }}
          path: |
            automation/social-media/output/*.json
            automation/social-media/output/images/*.png
          retention-days: 30
      
      - name: Clean up secrets
        if: always()
        working-directory: automation/social-media/scripts
        run: rm -f service-account.json
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly content generation failed. Check the logs."
